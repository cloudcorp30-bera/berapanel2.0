packages:
  "framer-motion": "For page transitions and smooth UI micro-interactions"
  "recharts": "For displaying project metrics and admin analytics charts"
  "date-fns": "For formatting dates and times"
  "clsx": "Utility for conditionally joining classNames"
  "tailwind-merge": "Utility for intelligently merging Tailwind classes"
  "lucide-react": "Beautiful consistent icon set"
  "xterm": "Terminal emulation for the in-browser PTY"
  "xterm-addon-fit": "Addon for resizing xterm to fit its container"
  "@monaco-editor/react": "In-browser code editor for file management"
  "react-hook-form": "Form state management"
  "@hookform/resolvers": "Zod resolver for forms"
  "zod": "Schema validation"

images:
  - path: "artifacts/berapanel/public/images/hero-bg.png"
    description: "Sleek, dark, abstract cyber-grid background with glowing cyan and deep purple neon accents, terminal tech vibe, highly professional"
    aspect_ratio: "16:9"
  - path: "artifacts/berapanel/public/images/logo.png"
    description: "Minimalist glowing geometric neon cloud server icon on a pure black background"
    aspect_ratio: "1:1"

notes:
  - Expects the @workspace/api-client-react package to be available and exporting React Query hooks generated by Orval.
  - Assuming proxy setup forwards /api to the backend server.
  - Assuming WebSocket for terminal is accessible via wss://<host>/api/brucepanel/projects/<id>/terminal.
