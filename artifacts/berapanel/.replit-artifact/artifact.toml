kind = "web"
previewPath = "/"
title = "BeraPanel"
version = "1.0.0"
id = "artifacts/berapanel"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19051
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/berapanel run dev"

[services.env]
PORT = "19051"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/berapanel", "run", "build"]
publicDir = "artifacts/berapanel/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
